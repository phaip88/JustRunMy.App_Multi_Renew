name: JustRunMy 自动续期 (无序随机版)

on:
  workflow_dispatch:
  schedule:
    # 每天北京时间 06:00 (UTC 22:00) 触发一次，再由脚本判断是否属于“两天一次”的执行日
    - cron: '0 22 * * *'

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      should_run: ${{ steps.check-schedule.outputs.should_run }}
    steps:
    - name: 每两天多账号随机签到
      id: check-schedule
      shell: bash
      run: |
        if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
          echo "should_run=true" >> "$GITHUB_OUTPUT"
          echo "手动触发，直接执行"
          exit 0
        fi

        TODAY_BJ=$(TZ='Asia/Shanghai' date +%F)
        ANCHOR_DATE="2026-05-16"

        TODAY_TS=$(date -d "$TODAY_BJ" +%s)
        ANCHOR_TS=$(date -d "$ANCHOR_DATE" +%s)
        DIFF_DAYS=$(( (TODAY_TS - ANCHOR_TS) / 86400 ))

        if [ $(( DIFF_DAYS % 2 )) -eq 0 ]; then
          echo "should_run=true" >> "$GITHUB_OUTPUT"
          echo "今天是执行日：$TODAY_BJ"
        else
          echo "should_run=false" >> "$GITHUB_OUTPUT"
          echo "今天不是执行日：$TODAY_BJ，跳过"
        fi

    - name: 生成账号矩阵
      id: set-matrix
      if: steps.check-schedule.outputs.should_run == 'true'
      shell: bash
      env:
        ALL_SECRETS: ${{ toJson(secrets) }}
      run: |
        ACCOUNTS=$(echo "$ALL_SECRETS" | jq -r 'keys[] | select(startswith("EML_"))' | sed 's/EML_//' | shuf)

        if [ -z "$ACCOUNTS" ]; then
          echo "未检测到 EML_x 格式的 Secrets，请检查配置！"
          exit 1
        fi

        INDEX_ARRAY=$(echo "$ACCOUNTS" | jq -R . | jq -s -c .)
        echo "matrix=$INDEX_ARRAY" >> "$GITHUB_OUTPUT"
        echo "账号矩阵已构建：$INDEX_ARRAY"

  renew:
    needs: setup
    if: needs.setup.outputs.should_run == 'true'
    runs-on: windows-latest
    timeout-minutes: 360
    strategy:
      max-parallel: 1
      fail-fast: false
      matrix:
        account_index: ${{ fromJson(needs.setup.outputs.matrix) }}

    steps:
    - name: 下载代码
      uses: actions/checkout@v4

    - name: 设置 Python 环境
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: 启动代理
      shell: pwsh
      env:
        PROXY_URL: ${{ secrets.PROXY_URL }}
      run: |
        if (-not $env:PROXY_URL) {
          Write-Output "未设置 PROXY_URL，将尝试直连。"
          exit 0
        }

        python proxy_handler.py
        $proxyEngine = Get-Content proxy_engine.txt

        if ($proxyEngine -eq "xray") {
          Write-Output "检测到 XHTTP，使用 Xray..."
          Invoke-WebRequest -Uri "https://github.com/XTLS/Xray-core/releases/latest/download/Xray-windows-64.zip" -OutFile "Xray-windows-64.zip"
          Expand-Archive -LiteralPath "Xray-windows-64.zip" -DestinationPath "xray-bin" -Force
          Start-Process -FilePath ".\xray-bin\xray.exe" -ArgumentList "run", "-config", "config.json" -WindowStyle Hidden
        }
        else
          $singboxVer = "1.11.0"
          Write-Output "正在安装 sing-box v$singboxVer..."
          Invoke-WebRequest -Uri "https://github.com/SagerNet/sing-box/releases/download/v$singboxVer/sing-box-$singboxVer-windows-amd64.zip" -OutFile "sing-box.zip"
          Expand-Archive -LiteralPath "sing-box.zip" -DestinationPath "sing-box-bin" -Force
          $singboxExe = Get-ChildItem -Recurse "sing-box-bin" -Filter "sing-box.exe" | Select-Object -First 1
          Start-Process -FilePath $singboxExe.FullName -ArgumentList "run", "-c", "config.json" -WindowStyle Hidden
        }

        Start-Sleep -Seconds 5

        Write-Output "验证代理出口..."
        $env:http_proxy = "http://127.0.0.1:8080"
        $env:https_proxy = "http://127.0.0.1:8080"
        curl.exe -fsS --connect-timeout 10 https://api.ipify.org

    - name: 安装自动化依赖
      run: |
        pip install DrissionPage requests

    - name: 运行账号 ${{ matrix.account_index }} 续期
      env:
        ACC: ${{ secrets[format('EML_{0}', matrix.account_index)] }}
        ACC_PWD: ${{ secrets[format('PWD_{0}', matrix.account_index)] }}
        TG_TOKEN: ${{ secrets.TG_TOKEN }}
        TG_ID: ${{ secrets.TG_ID }}
        PROXY_URL: ${{ secrets.PROXY_URL }}
      run: |
        Write-Output "开始处理账号索引: ${{ matrix.account_index }}"
        Write-Output "开始执行..."
        $env:RUN_ATTEMPT = "1"
        $env:BROWSER_PATH = "C:\Program Files (x86)\Microsoft\Edge\Application\msedge.exe"
        python reset_timer.py

    - name: 错误截图上传
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: debug-acc-${{ matrix.account_index }}
        path: "*.png"
        retention-days: 3
