name: JustRunMy 自动续期 (无序随机版)

on:
  workflow_dispatch:
  schedule:
    # 每天北京时间 06:00 (UTC 22:00) 触发一次，再由脚本判断是否属于“两天一次”的执行日
    - cron: '0 22 * * *'

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      should_run: ${{ steps.check-schedule.outputs.should_run }}
    steps:
    - name: 每两天多账号随机签到
      id: check-schedule
      shell: bash
      run: |
        if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
          echo "should_run=true" >> "$GITHUB_OUTPUT"
          echo "手动触发，直接执行"
          exit 0
        fi

        TODAY_BJ=$(TZ='Asia/Shanghai' date +%F)
        ANCHOR_DATE="2026-05-16"

        TODAY_TS=$(date -d "$TODAY_BJ" +%s)
        ANCHOR_TS=$(date -d "$ANCHOR_DATE" +%s)
        DIFF_DAYS=$(( (TODAY_TS - ANCHOR_TS) / 86400 ))

        if [ $(( DIFF_DAYS % 2 )) -eq 0 ]; then
          echo "should_run=true" >> "$GITHUB_OUTPUT"
          echo "今天是执行日：$TODAY_BJ"
        else
          echo "should_run=false" >> "$GITHUB_OUTPUT"
          echo "今天不是执行日：$TODAY_BJ，跳过"
        fi

    - name: 生成账号矩阵
      id: set-matrix
      if: steps.check-schedule.outputs.should_run == 'true'
      shell: bash
      env:
        ALL_SECRETS: ${{ toJson(secrets) }}
      run: |
        ACCOUNTS=$(echo "$ALL_SECRETS" | jq -r 'keys[] | select(startswith("EML_"))' | sed 's/EML_//' | shuf)

        if [ -z "$ACCOUNTS" ]; then
          echo "未检测到 EML_x 格式的 Secrets，请检查配置！"
          exit 1
        fi

        INDEX_ARRAY=$(echo "$ACCOUNTS" | jq -R . | jq -s -c .)
        echo "matrix=$INDEX_ARRAY" >> "$GITHUB_OUTPUT"
        echo "账号矩阵已构建：$INDEX_ARRAY"

  renew:
    needs: setup
    if: needs.setup.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 360
    strategy:
      max-parallel: 1
      fail-fast: false
      matrix:
        account_index: ${{ fromJson(needs.setup.outputs.matrix) }}

    steps:
    - name: 下载代码
      uses: actions/checkout@v4

    - name: 设置 Python 环境
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: 随机延迟 (0-30分钟)
      run: |
        DELAY=$(shuf -i 0-1800 -n 1)
        M=$(( DELAY / 60 ))
        S=$(( DELAY % 60 ))
        echo "账号 ${{ matrix.account_index }} 随机延迟: $M 分 $S 秒"
        sleep "$DELAY"

    - name: 启动代理
      env:
        PROXY_URL: ${{ secrets.PROXY_URL }}
      run: |
        if [ -z "$PROXY_URL" ]; then
          echo "未设置 PROXY_URL，将尝试直连。"
          exit 0
        fi

        python proxy_handler.py
        PROXY_ENGINE=$(cat proxy_engine.txt)

        if [ "$PROXY_ENGINE" = "xray" ]; then
          echo "检测到 XHTTP，使用 Xray..."
          wget -q "https://github.com/XTLS/Xray-core/releases/latest/download/Xray-linux-64.zip"
          unzip -q Xray-linux-64.zip xray
          chmod +x ./xray
          nohup ./xray run -config config.json > proxy.log 2>&1 &
        else
          SINGBOX_VER="1.11.0"
          echo "正在安装 sing-box v$SINGBOX_VER..."
          wget -q "https://github.com/SagerNet/sing-box/releases/download/v${SINGBOX_VER}/sing-box-${SINGBOX_VER}-linux-amd64.tar.gz"
          tar -xzf "sing-box-${SINGBOX_VER}-linux-amd64.tar.gz"
          mv "sing-box-${SINGBOX_VER}-linux-amd64/sing-box" ./sing-box
          chmod +x ./sing-box
          nohup ./sing-box run -c config.json > proxy.log 2>&1 &
        fi

        sleep 5

        echo "验证代理出口..."
        export http_proxy=http://127.0.0.1:8080
        export https_proxy=http://127.0.0.1:8080
        curl -fsS --connect-timeout 10 https://api.ipify.org || {
          echo "代理出口验证失败"
          cat proxy.log || true
          exit 1
        }

    - name: 安装自动化依赖
      run: |
        sudo apt-get update
        sudo apt-get install -y fonts-noto-cjk unzip
        pip install playwright requests
        playwright install firefox

    - name: 下载 Camoufox
      run: |
        CAMOUFOX_VERSION="150.0.2-alpha.26"
        curl -L -o camoufox.zip "https://github.com/daijro/camoufox/releases/download/v150.0.2-beta.25/camoufox-${CAMOUFOX_VERSION}-lin.x86_64.zip"
        unzip -o camoufox.zip -d camoufox
        chmod +x camoufox/camoufox

    - name: 运行账号 ${{ matrix.account_index }} 续期
      env:
        ACC: ${{ secrets[format('EML_{0}', matrix.account_index)] }}
        ACC_PWD: ${{ secrets[format('PWD_{0}', matrix.account_index)] }}
        TG_TOKEN: ${{ secrets.TG_TOKEN }}
        TG_ID: ${{ secrets.TG_ID }}
        PROXY_URL: ${{ secrets.PROXY_URL }}
      run: |
        echo "开始处理账号索引: ${{ matrix.account_index }}"

        echo "第 1 次执行..."
        if env RUN_ATTEMPT=1 CAMOUFOX_PATH=./camoufox/camoufox python reset_timer.py; then
          echo "第 1 次执行成功"
          exit 0
        fi

        echo "第 1 次执行失败，20 分钟后重试..."
        sleep 1200

        echo "第 2 次执行..."
        env RUN_ATTEMPT=2 CAMOUFOX_PATH=./camoufox/camoufox python reset_timer.py

    - name: 错误截图上传
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: debug-acc-${{ matrix.account_index }}
        path: "*.png"
        retention-days: 3
